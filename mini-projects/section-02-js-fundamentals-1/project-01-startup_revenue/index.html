<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Startup Revenue Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="javascript" href="script.js"
  </head>
  <body>
    <div class="container">
      <h1>🚀 Startup Revenue Dashboard</h1>

      <div class="report">
        <h2>Monthly Business Report</h2>
        <p id="startupName">Startup :</p>
        <p id="month">Month :</p>
        <hr />

        <p id="revenue">Revenue :</p>
        <p id="expenses">Expenses :</p>
        <p id="grossProfit">Gross Profit :</p>
        <p id="tax">Tax :</p>
        <p id="netProfit">Net Profit :</p>
        <p id = "targetCheck">target check</p>
        <hr />
        <p id="status">Business Status :</p>
        <p id = "investorRating"> investor rating</p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
